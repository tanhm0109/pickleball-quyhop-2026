<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4000 3000" width="4000" height="3000">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2550"/>
      <stop offset="100%" stop-color="#0e3a7a"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7d5a00"/>
      <stop offset="30%"  stop-color="#ffd700"/>
      <stop offset="50%"  stop-color="#ffe966"/>
      <stop offset="70%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#7d5a00"/>
