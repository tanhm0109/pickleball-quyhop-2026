<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4000 3000" width="4000" height="3000">
  <defs>
    <!-- Navy blue background matching MB Pickleball style -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1f6e"/>
      <stop offset="100%" stop-color="#071450"/>
    </linearGradient>
    <!-- Bright sport green bars -->
    <linearGradient id="greenH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a6626"/>
      <stop offset="35%"  stop-color="#12c248"/>
      <stop offset="50%"  stop-color="#18e855"/>
      <stop offset="65%"  stop-color="#12c248"/>
      <stop offset="100%" stop-color="#0a6626"/>
    </linearGradient>
    <linearGradient id="greenV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a6626"/>
      <stop offset="50%"  stop-color="#12c248"/>
      <stop offset="100%" stop-color="#0a6626"/>
    </linearGradient>
    <!-- Gold for dividers -->
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6b4a00"/>
      <stop offset="50%"  stop-color="#f5c518"/>
      <stop offset="100%" stop-color="#6b4a00"/>
    </linearGradient>
    <!-- Player silhouette glow -->
    <radialGradient id="playerGlowL" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#12c248" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#12c248" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="playerGlowR" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#12c248" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#12c248" stop-opacity="0"/>
    </radialGradient>
    <!-- Center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%"   stop-color="#1435b0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a1f6e" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="4000" height="3000" fill="url(#bgGrad)"/>
  <ellipse cx="2000" cy="1300" rx="1800" ry="1200" fill="url(#centerGlow)"/>

  <!-- Subtle diagonal texture -->
  <g opacity="0.022" stroke="#ffffff" stroke-width="60">
    <line x1="-400" y1="0" x2="600"  y2="3000"/>
    <line x1="0"    y1="0" x2="1000" y2="3000"/>
    <line x1="400"  y1="0" x2="1400" y2="3000"/>
    <line x1="800"  y1="0" x2="1800" y2="3000"/>
    <line x1="1200" y1="0" x2="2200" y2="3000"/>
    <line x1="1600" y1="0" x2="2600" y2="3000"/>
    <line x1="2000" y1="0" x2="3000" y2="3000"/>
    <line x1="2400" y1="0" x2="3400" y2="3000"/>
    <line x1="2800" y1="0" x2="3800" y2="3000"/>
    <line x1="3200" y1="0" x2="4200" y2="3000"/>
  </g>

  <!-- ── TOP GREEN BAR ── -->
  <rect x="0" y="0" width="4000" height="140" fill="url(#greenH)"/>
  <rect x="0" y="140" width="4000" height="5" fill="#f5c518" opacity="0.5"/>

  <!-- ── BOTTOM GREEN BAR ── -->
  <rect x="0" y="2860" width="4000" height="140" fill="url(#greenH)"/>
  <rect x="0" y="2855" width="4000" height="5" fill="#f5c518" opacity="0.5"/>

  <!-- Side lines -->
  <rect x="66"   y="145" width="10" height="2710" fill="url(#greenV)" opacity="0.5"/>
  <rect x="3924" y="145" width="10" height="2710" fill="url(#greenV)" opacity="0.5"/>
  <rect x="96"   y="145" width="3"  height="2710" fill="#f5c518" opacity="0.15"/>
  <rect x="3901" y="145" width="3"  height="2710" fill="#f5c518" opacity="0.15"/>

  <!-- Corner triangles -->
  <polygon points="106,145 420,145 106,460" fill="#12c248" opacity="0.16"/>
  <polygon points="3894,145 3580,145 3894,460" fill="#12c248" opacity="0.16"/>
  <polygon points="106,2855 420,2855 106,2540" fill="#12c248" opacity="0.16"/>
  <polygon points="3894,2855 3580,2855 3894,2540" fill="#12c248" opacity="0.16"/>

  <!-- ── CENTER CONTENT ── -->

  <!-- MAIN TITLE: GIẢI PICKLEBALL -->
  <text x="2000" y="740"
        text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="240" font-weight="900"
        letter-spacing="14"
        fill="#ffffff"
        filter="url(#subtleGlow)">GI&#7842;I PICKLEBALL</text>

  <!-- SUB-TITLE: GIAO LƯU with green highlight -->
  <rect x="720" y="770" width="2560" height="220" fill="#12c248" opacity="0.14" rx="6"/>
  <text x="2000" y="960"
        text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="210" font-weight="900"
        letter-spacing="40"
        fill="#12c248">GIAO L&#431;U</text>

  <!-- Divider: green + gold -->
  <rect x="320" y="1028" width="3360" height="9" fill="url(#greenH)" rx="4"/>
  <rect x="520" y="1045" width="2960" height="4" fill="#f5c518" opacity="0.38" rx="2"/>

  <!-- ORGANIZATION NAME -->
  <text x="2000" y="1212"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="122" font-weight="bold"
        letter-spacing="6"
        fill="#ffffff">H&#272;H QU&#7922; H&#7906;P KHU V&#7920;C PH&#205;A B&#7854;C</text>

  <!-- Thin gold line -->
  <rect x="680" y="1275" width="2640" height="4" fill="url(#goldH)" opacity="0.6" rx="2"/>

  <!-- DATE & LOCATION — Thứ Bảy fixed -->
  <text x="2000" y="1430"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="106"
        fill="#f5c518">Th&#7913; B&#7843;y, 06/06/2026&#160;&#160;&#8226;&#160;&#160;H&#224; N&#7897;i</text>

  <!-- SLOGAN -->
  <text x="2000" y="1720"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="80"
        fill="#12c248" opacity="0.7"
        letter-spacing="2">&#272;&#7891;ng h&#432;&#417;ng Qu&#7923; H&#7907;p &#8212; N&#417;i t&#236;nh qu&#234; h&#7897;i t&#7909;, n&#417;i s&#7913;c kh&#7887;e th&#259;ng hoa</text>

</svg>
