    <line x1="2200" y1="0" x2="3200" y2="3000"/>
    <line x1="2600" y1="0" x2="3600" y2="3000"/>
    <line x1="3000" y1="0" x2="4000" y2="3000"/>
    <line x1="3400" y1="0" x2="4400" y2="3000"/>
