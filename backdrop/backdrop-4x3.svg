<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4000 3000" width="4000" height="3000">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1f5e"/>
      <stop offset="100%" stop-color="#081540"/>
    </linearGradient>
    <linearGradient id="greenH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a5c22"/>
      <stop offset="30%"  stop-color="#18a84a"/>
      <stop offset="50%"  stop-color="#22cc58"/>
      <stop offset="70%"  stop-color="#18a84a"/>
      <stop offset="100%" stop-color="#0a5c22"/>
    </linearGradient>
    <linearGradient id="greenV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a5c22"/>
      <stop offset="50%"  stop-color="#18a84a"/>
      <stop offset="100%" stop-color="#0a5c22"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7d5a00"/>
      <stop offset="50%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#7d5a00"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#1a4a9a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0c1f5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ballGlowG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#18a84a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#18a84a" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

