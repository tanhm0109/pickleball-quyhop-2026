    <line x1="100"  y1="0" x2="1100" y2="3000"/>
    <line x1="500"  y1="0" x2="1500" y2="3000"/>
    <line x1="900"  y1="0" x2="1900" y2="3000"/>
    <line x1="1300" y1="0" x2="2300" y2="3000"/>
    <line x1="1700" y1="0" x2="2700" y2="3000"/>
    <line x1="2100" y1="0" x2="3100" y2="3000"/>
    <line x1="2500" y1="0" x2="3500" y2="3000"/>
    <line x1="2900" y1="0" x2="3900" y2="3000"/>
